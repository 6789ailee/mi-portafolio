<section class="min-h-screen flex items-center justify-center py-20 px-6">
  <div class="max-w-2xl w-full bg-white dark:bg-slate-800 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-slate-100 dark:border-slate-700">
    
    <div class="text-center mb-10">
      <h2 class="text-4xl font-black mb-4">Hablemos de tu proyecto</h2>
      <p class="text-slate-500">Completa el formulario y te responderé en menos de 24 horas.</p>
    </div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-bold mb-2 ml-1">Nombre</label>
        <input formControlName="name" type="text" 
               class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none"
               placeholder="Tu nombre completo">
        <span *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched" class="text-red-500 text-xs mt-1 ml-1">
          El nombre es obligatorio (min. 3 caracteres).
        </span>
      </div>

      <div>
        <label class="block text-sm font-bold mb-2 ml-1">Email</label>
        <input formControlName="email" type="email" 
               class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none"
               placeholder="tu@email.com">
        <span *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched" class="text-red-500 text-xs mt-1 ml-1">
          Por favor, ingresa un correo electrónico válido.
        </span>
      </div>

      <div>
        <label class="block text-sm font-bold mb-2 ml-1">Mensaje</label>
        <textarea formControlName="message" rows="5" 
                  class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none resize-none"
                  placeholder="Cuéntame sobre tu idea..."></textarea>
      </div>

      <button type="submit" [disabled]="contactForm.invalid || isSubmitting"
              class="w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white rounded-2xl font-black text-lg transition-all transform hover:scale-[1.02] shadow-xl shadow-blue-500/20">
        {{ isSubmitting ? 'Enviando...' : 'Enviar Mensaje' }}
      </button>

    </form>
  </div>
</section>
