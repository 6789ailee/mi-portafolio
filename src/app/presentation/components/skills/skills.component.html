<section class="py-24 bg-[#000000] relative overflow-hidden">
  <div class="container mx-auto px-6 relative z-10">
    
    <div class="mb-16 text-center">
      <h2 class="text-4xl md:text-5xl font-black text-white mb-4">
        Mi <span class="bg-gradient-to-r from-[#A78BFA] to-[#E879F9] bg-clip-text text-transparent">Stack Tecnológico</span>
      </h2>
      <p class="text-gray-500 font-light max-w-2xl mx-auto">
        Herramientas y tecnologías que domino para construir productos digitales de alto rendimiento.
      </p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
      @for (skill of skills; track skill.name) {
        <div class="group relative p-8 rounded-[2rem] bg-white/[0.03] border border-white/10 backdrop-blur-md flex flex-col items-center justify-center transition-all duration-500 hover:-translate-y-2 hover:bg-white/[0.07] hover:border-white/20">
          
          <div class="absolute inset-0 rounded-[2rem] opacity-0 group-hover:opacity-20 blur-2xl transition-opacity duration-500"
               [style.backgroundColor]="skill.color"></div>

          <div class="relative z-10 mb-4 w-12 h-12 flex items-center justify-center">
            <img [src]="skill.icon" [alt]="skill.name" class="w-full h-full object-contain filter grayscale group-hover:grayscale-0 transition-all duration-500">
          </div>

          <span class="relative z-10 text-gray-400 font-medium group-hover:text-white transition-colors uppercase tracking-widest text-[10px]">
            {{ skill.name }}
          </span>
        </div>
      }
    </div>
  </div>

  <div class="absolute top-1/2 right-[-10%] w-[400px] h-[400px] bg-[#A78BFA]/5 blur-[120px] rounded-full pointer-events-none"></div>
</section>
