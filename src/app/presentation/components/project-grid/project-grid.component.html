<section class="py-24 bg-[#000000]">
  <div class="container mx-auto px-6">
    
    <div class="mb-16 flex flex-col md:flex-row md:items-end justify-between gap-6">
      <div>
        <p class="text-[#A78BFA] font-mono text-xs tracking-[0.3em] mb-2">// PORTFOLIO</p>
        <h2 class="text-5xl font-black text-white">Proyectos <span class="text-gray-600">Destacados</span></h2>
      </div>
      <button class="text-white border-b border-[#E879F9] pb-1 hover:text-[#E879F9] transition-colors font-mono text-sm">
        Ver todos los repositorios _
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 auto-rows-[300px]">
      
      @for (p of projects; track p.title) {
        <div [class.md:col-span-2]="p.size === 'large' || p.size === 'medium'"
             [class.md:row-span-2]="p.size === 'large'"
             class="group relative rounded-[2.5rem] overflow-hidden border border-white/10 bg-white/[0.02] backdrop-blur-sm transition-all duration-700 hover:border-[#A78BFA]/30">
          
          <img [src]="p.image" 
               class="absolute inset-0 w-full h-full object-cover opacity-50 grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000">
          
          <div class="absolute inset-0 bg-gradient-to-t from-[#000000] via-black/20 to-transparent"></div>

          <div class="absolute inset-0 p-8 flex flex-col justify-end translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
            <span class="text-[#F472B6] text-xs font-mono mb-2">{{ p.category }}</span>
            <h3 class="text-2xl font-bold text-white mb-4">{{ p.title }}</h3>
            
            <div class="flex flex-wrap gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-700 delay-100">
              @for (tag of p.tags; track tag) {
                <span class="px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] text-gray-300 backdrop-blur-md">
                  {{ tag }}
                </span>
              }
            </div>
          </div>

          <div class="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center opacity-0 group-hover:opacity-100 -translate-y-4 group-hover:translate-y-0 transition-all duration-500">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </div>
        </div>
      }

    </div>
  </div>
</section>
