@if (isLoading()) {
  <app-loading-screen (loadingFinished)="finishLoading()"></app-loading-screen>
}

<div [class.opacity-0]="isLoading()" 
     [class.opacity-100]="!isLoading()" 
     class="transition-opacity duration-1000 ease-in-out bg-[#000000] min-h-screen flex flex-col">
  
  <app-navbar></app-navbar>

  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
